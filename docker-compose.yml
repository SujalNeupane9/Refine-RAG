services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    environment:
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3.5-flash}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-models/text-embedding-004}
      VECTOR_STORE_PATH: ${VECTOR_STORE_PATH:-/app/backend/data/vector_store}
      MAX_RETRIEVAL_RETRIES: ${MAX_RETRIEVAL_RETRIES:-2}
      TOP_K: ${TOP_K:-4}
      BACKEND_URL: ${BACKEND_URL:-http://backend:8000}
    volumes:
      - backend-data:/app/backend/data

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    env_file:
      - .env
    ports:
      - "8501:8501"
    environment:
      BACKEND_URL: ${BACKEND_URL:-http://backend:8000}
    depends_on:
      - backend

volumes:
  backend-data:
